[package]
name = "envision"
version = "0.5.0"
edition = "2021"
rust-version = "1.81"
description = "A ratatui framework for collaborative TUI development with headless testing support"
license = "MIT"
repository = "https://github.com/ryanoneill/envision"
readme = "README.md"
documentation = "https://docs.rs/envision"
keywords = ["tui", "terminal", "ratatui", "testing", "headless"]
categories = ["command-line-interface", "development-tools::testing"]

[features]
default = ["serialization"]
serialization = ["dep:serde", "dep:serde_json", "compact_str/serde"]
tracing = ["dep:tracing"]

[dependencies]
ratatui = "0.29"
crossterm = { version = "0.28", features = ["event-stream"] }
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }
tracing = { version = "0.1", optional = true }
unicode-width = "0.2"
compact_str = "0.8"
tokio = { version = "1", features = ["sync", "rt", "macros", "time"] }
tokio-stream = "0.1"
tokio-util = "0.7"
async-stream = "0.3"
futures-util = "0.3"

[dev-dependencies]
insta = { version = "1.41", features = ["json"] }
tokio = { version = "1", features = ["full", "test-util"] }
pretty_assertions = "1.4"
tempfile = "3.24.0"
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "~1.8"
# Note: fastbreak is used for spec validation via CLI, not as a cargo dependency
# Run `fastbreak check` to validate specs/main.fbrk

[[bench]]
name = "capture_backend"
harness = false

[[bench]]
name = "runtime"
harness = false

[[bench]]
name = "component_view"
harness = false

[[bench]]
name = "component_events"
harness = false
